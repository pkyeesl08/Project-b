<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>카오스 제로 나이트메어 이상형 월드컵</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #fff;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .screen { display: none; min-height: 100dvh; }
    .screen.active { display: flex; flex-direction: column; }

    /* ─── Join Screen ─── */
    #join-screen {
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2a 50%, #0a1a2a 100%);
    }

    .title {
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      font-weight: 900;
      text-align: center;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #ff4444, #ff8800, #ffcc00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
    }

    .subtitle {
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      color: #888;
      text-align: center;
      margin-bottom: 32px;
    }

    .join-form {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .join-form input {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: 2px solid #333;
      background: #1a1a2e;
      color: #fff;
      font-size: 18px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .join-form input:focus {
      border-color: #ff4444;
    }

    .btn {
      padding: 16px 32px;
      border-radius: 12px;
      border: none;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: linear-gradient(135deg, #ff4444, #ff6600);
      color: #fff;
    }

    .btn-secondary {
      background: #2a2a3e;
      color: #ccc;
      border: 2px solid #444;
    }

    /* ─── Lobby Screen ─── */
    #lobby-screen {
      align-items: center;
      padding: 20px;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2a 100%);
    }

    .lobby-header {
      text-align: center;
      margin-top: 40px;
      margin-bottom: 20px;
    }

    .lobby-header h2 {
      font-size: 1.5rem;
      color: #ff8800;
    }

    .player-count {
      font-size: 3rem;
      font-weight: 900;
      color: #fff;
      margin: 16px 0;
    }

    .player-list {
      width: 100%;
      max-width: 400px;
      flex: 1;
      overflow-y: auto;
      padding: 0 10px;
    }

    .player-item {
      padding: 12px 16px;
      background: #1a1a2e;
      border-radius: 10px;
      margin-bottom: 8px;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .player-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2ecc71;
    }

    .lobby-actions {
      padding: 20px;
      width: 100%;
      max-width: 400px;
    }

    .lobby-actions .btn { width: 100%; }

    .waiting-text {
      text-align: center;
      color: #666;
      font-size: 14px;
      padding: 16px;
    }

    /* ─── Vote Screen ─── */
    #vote-screen {
      background: #0a0a0f;
    }

    .vote-header {
      text-align: center;
      padding: 12px 16px;
      background: #111122;
      border-bottom: 1px solid #222;
    }

    .round-info {
      font-size: 14px;
      color: #ff8800;
      font-weight: 700;
    }

    .match-info {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }

    .timer-bar {
      width: 100%;
      height: 4px;
      background: #222;
      position: relative;
    }

    .timer-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff4444, #ff8800);
      transition: width 0.1s linear;
      width: 100%;
    }

    .timer-fill.urgent {
      background: linear-gradient(90deg, #ff0000, #ff4444);
      animation: pulse-bar 0.5s infinite;
    }

    @keyframes pulse-bar {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .timer-text {
      text-align: center;
      font-size: 2rem;
      font-weight: 900;
      padding: 8px 0;
      color: #fff;
    }

    .timer-text.urgent {
      color: #ff4444;
      animation: pulse-text 0.5s infinite;
    }

    @keyframes pulse-text {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .vote-area {
      flex: 1;
      display: flex;
      flex-direction: row;
      gap: 0;
    }

    .vote-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px 10px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .vote-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.15;
      transition: opacity 0.2s;
    }

    .vote-card:active { transform: scale(0.97); }

    .vote-card.selected {
      transform: scale(1.02);
    }

    .vote-card.selected::before { opacity: 0.3; }

    .vote-card.disabled { pointer-events: none; opacity: 0.6; }

    .vs-divider {
      width: 2px;
      background: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .vs-badge {
      position: absolute;
      background: #ff4444;
      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 14px;
      z-index: 2;
    }

    .char-emoji {
      font-size: clamp(3rem, 15vw, 5rem);
      margin-bottom: 12px;
    }

    .char-name {
      font-size: clamp(1.2rem, 5vw, 1.8rem);
      font-weight: 900;
      margin-bottom: 4px;
    }

    .char-desc {
      font-size: 13px;
      color: #999;
      text-align: center;
    }

    .vote-status {
      text-align: center;
      padding: 12px;
      background: #111122;
      border-top: 1px solid #222;
    }

    .vote-count-bar {
      display: flex;
      gap: 4px;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #888;
    }

    .voted-badge {
      display: inline-block;
      padding: 4px 12px;
      background: #2ecc71;
      color: #fff;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      margin-top: 6px;
    }

    /* ─── Result Screen ─── */
    #result-screen {
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2a 100%);
      text-align: center;
    }

    .result-title {
      font-size: 1.2rem;
      color: #ff8800;
      margin-bottom: 8px;
    }

    .result-winner {
      margin: 20px 0;
    }

    .result-winner .char-emoji { font-size: 4rem; }
    .result-winner .char-name { font-size: 1.5rem; }

    .result-vs {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 12px 0;
      font-size: 14px;
      color: #888;
    }

    .result-votes {
      display: flex;
      gap: 20px;
      margin: 12px 0;
    }

    .result-vote-block {
      text-align: center;
    }

    .result-vote-num {
      font-size: 2rem;
      font-weight: 900;
    }

    .result-vote-label {
      font-size: 12px;
      color: #888;
    }

    .result-reason {
      font-size: 13px;
      color: #ff8800;
      margin-top: 8px;
      padding: 6px 16px;
      background: rgba(255, 136, 0, 0.1);
      border-radius: 20px;
    }

    /* ─── Final Screen ─── */
    #final-screen {
      align-items: center;
      padding: 20px;
      background: linear-gradient(135deg, #0a0a1a 0%, #2a0a1a 50%, #0a1a2a 100%);
    }

    .final-title {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 900;
      margin-top: 30px;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #ffd700, #ff8800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .champion {
      margin: 20px 0;
      text-align: center;
    }

    .champion .char-emoji { font-size: 5rem; }
    .champion .char-name {
      font-size: 2rem;
      background: linear-gradient(90deg, #ffd700, #ff8800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .crown { font-size: 3rem; margin-bottom: 8px; }

    .ranking-list {
      width: 100%;
      max-width: 400px;
      flex: 1;
      overflow-y: auto;
    }

    .rank-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #1a1a2e;
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .rank-num {
      font-size: 1.4rem;
      font-weight: 900;
      width: 36px;
      text-align: center;
    }

    .rank-num.gold { color: #ffd700; }
    .rank-num.silver { color: #c0c0c0; }
    .rank-num.bronze { color: #cd7f32; }

    .rank-emoji { font-size: 1.5rem; }
    .rank-name { font-size: 1rem; font-weight: 700; flex: 1; }

    .final-actions {
      padding: 20px;
      width: 100%;
      max-width: 400px;
    }

    .final-actions .btn { width: 100%; }

    /* ─── Animations ─── */
    @keyframes slideInLeft {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes bounceIn {
      0% { transform: scale(0); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .animate-left { animation: slideInLeft 0.4s ease-out; }
    .animate-right { animation: slideInRight 0.4s ease-out; }
    .animate-bounce { animation: bounceIn 0.5s ease-out; }

    /* confetti canvas */
    #confetti {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>

  <!-- Join Screen -->
  <div id="join-screen" class="screen active">
    <div class="title">카오스 제로 나이트메어</div>
    <div class="subtitle">이상형 월드컵</div>
    <div class="join-form">
      <input type="text" id="name-input" placeholder="닉네임 입력" maxlength="20" autocomplete="off">
      <button class="btn btn-primary" id="join-btn">입장하기</button>
    </div>
  </div>

  <!-- Lobby Screen -->
  <div id="lobby-screen" class="screen">
    <div class="lobby-header">
      <h2>대기실</h2>
      <div class="player-count"><span id="player-count">0</span>명</div>
    </div>
    <div class="player-list" id="player-list"></div>
    <div class="lobby-actions">
      <button class="btn btn-primary" id="start-btn" disabled>게임 시작</button>
      <div class="waiting-text" id="waiting-text">플레이어를 기다리는 중...</div>
    </div>
  </div>

  <!-- Vote Screen -->
  <div id="vote-screen" class="screen">
    <div class="vote-header">
      <div class="round-info" id="round-info">16강</div>
      <div class="match-info" id="match-info">매치 1/8</div>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
    <div class="timer-text" id="timer-text">10</div>
    <div class="vote-area">
      <div class="vote-card" id="card-left">
        <div class="char-emoji" id="left-emoji"></div>
        <div class="char-name" id="left-name"></div>
        <div class="char-desc" id="left-desc"></div>
      </div>
      <div class="vs-divider"><div class="vs-badge">VS</div></div>
      <div class="vote-card" id="card-right">
        <div class="char-emoji" id="right-emoji"></div>
        <div class="char-name" id="right-name"></div>
        <div class="char-desc" id="right-desc"></div>
      </div>
    </div>
    <div class="vote-status">
      <div class="vote-count-bar">
        <span id="vote-progress">투표 대기 중...</span>
      </div>
      <div id="voted-indicator" style="display:none">
        <span class="voted-badge">투표 완료!</span>
      </div>
    </div>
  </div>

  <!-- Match Result Screen (brief) -->
  <div id="result-screen" class="screen">
    <div class="result-title" id="result-round-name"></div>
    <div class="result-winner animate-bounce">
      <div class="char-emoji" id="result-emoji"></div>
      <div class="char-name" id="result-name">승리!</div>
    </div>
    <div class="result-votes">
      <div class="result-vote-block">
        <div class="result-vote-num" id="result-left-votes">0</div>
        <div class="result-vote-label" id="result-left-name"></div>
      </div>
      <div style="color:#555; font-size:1.5rem;">:</div>
      <div class="result-vote-block">
        <div class="result-vote-num" id="result-right-votes">0</div>
        <div class="result-vote-label" id="result-right-name"></div>
      </div>
    </div>
    <div class="result-reason" id="result-reason"></div>
  </div>

  <!-- Final Ranking Screen -->
  <div id="final-screen" class="screen">
    <canvas id="confetti"></canvas>
    <div class="final-title">최종 결과</div>
    <div class="champion">
      <div class="crown">👑</div>
      <div class="char-emoji" id="champ-emoji"></div>
      <div class="char-name" id="champ-name"></div>
      <div class="char-desc" id="champ-desc"></div>
    </div>
    <div class="ranking-list" id="ranking-list"></div>
    <div class="final-actions">
      <button class="btn btn-primary" id="restart-btn">다시 하기</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    // ─── Elements ───
    const screens = {
      join: document.getElementById('join-screen'),
      lobby: document.getElementById('lobby-screen'),
      vote: document.getElementById('vote-screen'),
      result: document.getElementById('result-screen'),
      final: document.getElementById('final-screen'),
    };

    function showScreen(name) {
      Object.values(screens).forEach(s => s.classList.remove('active'));
      screens[name].classList.add('active');
    }

    // ─── Join ───
    const nameInput = document.getElementById('name-input');
    const joinBtn = document.getElementById('join-btn');

    joinBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if (!name) { nameInput.focus(); return; }
      socket.emit('join', name);
      showScreen('lobby');
    });

    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') joinBtn.click();
    });

    // ─── Lobby ───
    const startBtn = document.getElementById('start-btn');

    socket.on('lobby-update', (data) => {
      document.getElementById('player-count').textContent = data.players.length;
      const list = document.getElementById('player-list');
      list.innerHTML = data.players.map(p =>
        `<div class="player-item"><div class="player-dot"></div>${escapeHtml(p.name)}</div>`
      ).join('');

      startBtn.disabled = !data.canStart;
      document.getElementById('waiting-text').textContent =
        data.canStart ? '준비 완료! 게임을 시작하세요.' : '플레이어를 기다리는 중...';
    });

    startBtn.addEventListener('click', () => {
      socket.emit('start-game');
    });

    // ─── Voting ───
    let matchStartTime = 0;
    let timerInterval = null;
    let hasVoted = false;

    socket.on('match-start', (data) => {
      showScreen('vote');
      hasVoted = false;

      // round info
      document.getElementById('round-info').textContent = data.roundName;
      document.getElementById('match-info').textContent = `매치 ${data.matchIndex}/${data.totalMatches}`;

      // characters
      const leftCard = document.getElementById('card-left');
      const rightCard = document.getElementById('card-right');

      leftCard.className = 'vote-card animate-left';
      rightCard.className = 'vote-card animate-right';
      leftCard.style.background = `linear-gradient(135deg, ${data.left.color}22, ${data.left.color}11)`;
      rightCard.style.background = `linear-gradient(135deg, ${data.right.color}22, ${data.right.color}11)`;

      document.getElementById('left-emoji').textContent = data.left.emoji;
      document.getElementById('left-name').textContent = data.left.name;
      document.getElementById('left-desc').textContent = data.left.desc;
      document.getElementById('right-emoji').textContent = data.right.emoji;
      document.getElementById('right-name').textContent = data.right.name;
      document.getElementById('right-desc').textContent = data.right.desc;

      // reset vote UI
      document.getElementById('voted-indicator').style.display = 'none';
      document.getElementById('vote-progress').textContent = '투표 대기 중...';

      // timer - use server deadline for sync
      matchStartTime = Date.now();
      const deadline = data.deadline;
      clearInterval(timerInterval);

      const timerFill = document.getElementById('timer-fill');
      const timerText = document.getElementById('timer-text');
      timerFill.className = 'timer-fill';
      timerText.className = 'timer-text';

      timerInterval = setInterval(() => {
        const remaining = Math.max(0, (deadline - Date.now()) / 1000);
        const pct = (remaining / data.timeLimit) * 100;
        timerFill.style.width = pct + '%';
        timerText.textContent = Math.ceil(remaining);

        if (remaining <= 3) {
          timerFill.classList.add('urgent');
          timerText.classList.add('urgent');
        }

        if (remaining <= 0) {
          clearInterval(timerInterval);
          timerText.textContent = '0';
          leftCard.classList.add('disabled');
          rightCard.classList.add('disabled');
        }
      }, 100);
    });

    document.getElementById('card-left').addEventListener('click', () => vote('left'));
    document.getElementById('card-right').addEventListener('click', () => vote('right'));

    function vote(choice) {
      if (hasVoted) return;
      hasVoted = true;

      const elapsed = Date.now() - matchStartTime;
      socket.emit('vote', { choice, time: elapsed });

      const leftCard = document.getElementById('card-left');
      const rightCard = document.getElementById('card-right');

      if (choice === 'left') {
        leftCard.classList.add('selected');
        rightCard.style.opacity = '0.4';
      } else {
        rightCard.classList.add('selected');
        leftCard.style.opacity = '0.4';
      }

      document.getElementById('voted-indicator').style.display = 'block';
    }

    socket.on('vote-update', (data) => {
      document.getElementById('vote-progress').textContent =
        `${data.totalVoted}/${data.totalPlayers}명 투표 완료`;
    });

    // ─── Match Result ───
    socket.on('match-result', (data) => {
      clearInterval(timerInterval);
      showScreen('result');

      document.getElementById('result-round-name').textContent = data.roundName;
      document.getElementById('result-emoji').textContent = data.winner.emoji;
      document.getElementById('result-name').textContent = data.winner.name + ' 승리!';
      document.getElementById('result-left-votes').textContent = data.leftVotes;
      document.getElementById('result-right-votes').textContent = data.rightVotes;
      document.getElementById('result-left-name').textContent = data.left.name;
      document.getElementById('result-right-name').textContent = data.right.name;

      const reasonEl = document.getElementById('result-reason');
      if (data.reason === 'tiebreaker') {
        reasonEl.textContent = '⏱️ 동점! 빠른 선택 합산으로 결정';
        reasonEl.style.display = 'block';
      } else if (data.reason === 'no-votes') {
        reasonEl.textContent = '⚠️ 투표 없음 - 왼쪽 기본 승리';
        reasonEl.style.display = 'block';
      } else {
        reasonEl.textContent = '다수결로 결정!';
        reasonEl.style.display = 'block';
      }
    });

    // ─── Final ───
    socket.on('game-finished', (data) => {
      showScreen('final');

      const champ = data.ranking[0]?.character;
      if (champ) {
        document.getElementById('champ-emoji').textContent = champ.emoji;
        document.getElementById('champ-name').textContent = champ.name;
        document.getElementById('champ-desc').textContent = champ.desc;
      }

      const list = document.getElementById('ranking-list');
      list.innerHTML = data.ranking.map((r) => {
        let rankClass = '';
        let prefix = r.rank;
        if (r.rank === 1) { rankClass = 'gold'; prefix = '🥇'; }
        else if (r.rank === 2) { rankClass = 'silver'; prefix = '🥈'; }
        else if (r.rank === 3) { rankClass = 'bronze'; prefix = '🥉'; }

        return `
          <div class="rank-item">
            <div class="rank-num ${rankClass}">${prefix}</div>
            <div class="rank-emoji">${r.character.emoji}</div>
            <div class="rank-name">${escapeHtml(r.character.name)}</div>
          </div>
        `;
      }).join('');

      // confetti effect
      launchConfetti();
    });

    document.getElementById('restart-btn').addEventListener('click', () => {
      socket.emit('restart-game');
      showScreen('lobby');
    });

    // ─── Utils ───
    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    // ─── Simple Confetti ───
    function launchConfetti() {
      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const pieces = [];
      const colors = ['#ff4444', '#ff8800', '#ffcc00', '#2ecc71', '#3498db', '#9b59b6', '#ffd700'];

      for (let i = 0; i < 100; i++) {
        pieces.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          w: Math.random() * 10 + 5,
          h: Math.random() * 6 + 3,
          color: colors[Math.floor(Math.random() * colors.length)],
          vx: (Math.random() - 0.5) * 4,
          vy: Math.random() * 3 + 2,
          rot: Math.random() * 360,
          vr: (Math.random() - 0.5) * 10,
        });
      }

      let frame = 0;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate((p.rot * Math.PI) / 180);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();

          p.x += p.vx;
          p.y += p.vy;
          p.rot += p.vr;
          p.vy += 0.05;
        });

        frame++;
        if (frame < 180) requestAnimationFrame(draw);
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      draw();
    }
  </script>
